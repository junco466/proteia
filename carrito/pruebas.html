<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito de Proteínas</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="container">

    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="../index.html">
        <div class="logo">
          <img src="../assets/logo.jpeg" alt="logo ">
          <span>Prote</span>IA
        </div>
      </a>
      <nav>
        <a href="../IA/proteIA.html">IA</a>
        <a href="../carrito/pruebas.html">Tienda</a>
        <a href="../quienessomos/quienes-somos.html">Quienes Somos</a>
        <a href="../Rutinas/index.html">Rutinas</a>
      </nav>
      <div>
        <button class="btn-principal">Probar gratis</button>
      </div>
    </nav>
  </header>

  <main>

    <h1 class="title">Tienda de Proteínas</h1>

    <!-- PRODUCTOS -->
    <section class="productos">

      <article class="producto-card">
        <img src="https://zonafit.co/cdn/shop/files/Gold_Standard_Whey_Optimum_Nutrition_10_serv_Vanilla.jpg?v=1763585742">
        <div class="info">
          <h2>Proteína Whey 1kg</h2>
          <p>$100.000 COP</p>
          <div>
            <button class="btn-secundario" onclick="agregarAlCarrito('Proteína Whey 1kg', 100000)">Añadir</button>
          </div>
        </div>
      </article>

      <article class="producto-card">
        <img src="https://media.falabella.com/falabellaCL/130081391_01/w=1500,h=1500,fit=cover">
        <div class="info">
          <h2>Proteína Vegana 1kg</h2>
          <p>$120.000 COP</p>
          <div>
            <button class="btn-secundario" onclick="agregarAlCarrito('Proteína Vegana 1kg', 120000)">Añadir</button>
          </div>
        </div>
      </article>
      </article>


      <article class="producto-card">
        <img src="https://m.media-amazon.com/images/I/71NhMw+uprL._AC_UF1000,1000_QL80_.jpg">
        <div class="info">
          <h2>Proteína Isolate 2kg</h2>
          <p>$180.000 COP</p>
          <div>
            <button class="btn-secundario" onclick="agregarAlCarrito('Proteína Isolate 2kg', 180000)">Añadir</button>
          </div>
        </div>

      </article>
      </article>

    </section>

    <!-- CARRITO -->
    <aside class="carrito">
      <h2>Carrito</h2>

      <ul id="lista-carrito"></ul>

      <p id="total">Total: $0</p>

      <button id="vaciar">Vaciar carrito</button>
    </aside>

  </main>

  <script src="script.js"></script>
</body>

</html>
