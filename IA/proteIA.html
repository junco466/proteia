<body>

    <nav>

    <div>
      <button class="btn-principal">Probar gratis</button>
    </div>

  <header class="container">

      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Respuestas rápidas</h5>
            <p class="card-text">Nuestra IA responde en segundos con información clara.</p>

    <div id="output" class="output"></div>

      <input id="chatInput" class="chat-box" type="text" placeholder="Type a message...">
